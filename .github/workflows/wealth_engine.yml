name: Viral Wealth Engine

on:
  schedule:
    - cron: '30 3 * * *'  # 9:00 AM IST
    - cron: '30 8 * * *'  # 2:00 PM IST
    - cron: '30 13 * * *' # 7:00 PM IST
    - cron: '30 17 * * *' # 11:00 PM IST
  workflow_dispatch:

jobs:
  post_viral:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v2
        with:
          python-version: '3.x'
      - run: pip install requests
      - name: Run Script
        env:
          AYRSHARE_BRAND_TOKEN: ${{ secrets.AYRSHARE_BRAND_TOKEN }}
        run: python viral_poster.py
