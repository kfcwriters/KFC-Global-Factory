name: 24-7 Global Medical Outreach Strike

on:
  workflow_dispatch:

jobs:
  outreach-cycle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Global Lead Hunter
        run: python3 lead_hunter_global.py

      - name: Execute Email Dispatch
        # MAPPING SECRETS: Using your exact names from image_660da4.png
        env:
          EMAIL_USER: "your-email@gmail.com" # Replace this with your actual Gmail or a new secret
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        run: python3 email_sender.py

      - name: Notify Telegram of Success
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 -c "
          import requests, os
          if os.path.exists('business_leads.txt'):
              lead = open('business_leads.txt').readlines()[0].strip()
              msg = f'📬 OUTREACH COMPLETE\n{lead}\nStatus: Email Dispatched Successfully.'
              requests.post(f'https://api.telegram.org/bot{os.getenv(\"TELEGRAM_TOKEN\")}/sendMessage', 
                            data={'chat_id': os.getenv(\"TELEGRAM_CHAT_ID\"), 'text': msg})
          "
