name: 24-7 KFC Global Synthetic Factory

on:
  schedule:
    # Runs at 5 minutes past every hour to avoid GitHub traffic jams
    - cron: '5 * * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  medical-strike:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Institutional Code
        uses: actions/checkout@v4

      - name: 2. Set up Research Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. Install Global Dependencies
        run: pip install requests

      - name: 4. Execute Triple Autonomy Strike
        env:
          # These must match the names in your GitHub Secrets exactly
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          # We hardcode the production key for the Media Agent to ensure 1080p delivery
          SHOTSTACK_KEY: "ExZhq8U3rOIRgdUQDeIbar4vwtbM6GLAwn2Ei3Hq"
        run: |
          echo "🚀 Starting Agent 1: PubMed Hunter..."
          python3 outreach_specialist.py
          
          echo "🚀 Starting Agent 2: Media Producer..."
          python3 media_producer.py
          
          echo "🚀 Starting Agent 3: Google Lead Hunter..."
          python3 google_lead_hunter.py

      - name: 5. Finalize Global Logs
        run: echo "✅ All 3 Agents successfully completed their hourly strike."
