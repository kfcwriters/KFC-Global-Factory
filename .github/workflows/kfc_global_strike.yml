name: 24-7 KFC Global Synthetic Factory

on:
  workflow_dispatch:
  schedule:
    - cron: '5 * * * *'

jobs:
  medical-strike:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Essentials (ImageMagick + FFmpeg)
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg imagemagick
          # 🛡️ Configure ImageMagick security to allow PDF/Text rendering
          sudo sed -i 's/policy domain="path" rights="none" pattern="@\*"/policy domain="path" rights="read|write" pattern="@\*"/g' /etc/ImageMagick-6/policy.xml
          pip install requests moviepy==2.0.0.dev2 google-api-python-client google-auth-oauthlib

      - name: 1. Hunt & Email
        env:
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        run: |
          python3 google_lead_hunter.py
          python3 outreach_specialist.py

      - name: 2. Render & Upload (720p)
        run: python3 youtube_uploader.py
