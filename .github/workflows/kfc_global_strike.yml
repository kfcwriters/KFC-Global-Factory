name: 24-7 KFC Global Synthetic Factory
on:
  workflow_dispatch:
  schedule:
    - cron: '5 * * * *'
jobs:
  medical-strike:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Strike
        env:
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        run: |
          pip install requests google-api-python-client google-auth-oauthlib
          python3 google_lead_hunter.py
          python3 outreach_specialist.py
          python3 youtube_uploader.py
