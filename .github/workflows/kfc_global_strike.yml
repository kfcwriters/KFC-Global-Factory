name: 24-7 KFC Global Synthetic Factory

on:
  workflow_dispatch:
  schedule:
    - cron: '5 * * * *'

jobs:
  medical-strike:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 1. Checkout Institutional Code
        uses: actions/checkout@v4

      - name: 2. Execute Multi-Disciplinary Professor (Audio + Animation)
        run: |
          # 📚 Database for Global Medical Students & Researchers
          SUBJECTS=("PATHOLOGY" "PHARMACOLOGY" "SURGERY" "MEDICINE")
          TOPICS=("Cellular Adaptation" "Drug Half-Life" "Surgical Hemostasis" "Acute Coronary Syndrome")
          SCRIPTS=("Cellular adaptation refers to changes made by a cell in response to adverse environmental changes, including hypertrophy and atrophy." "The half-life of a drug is the time taken for its plasma concentration to reduce by fifty percent." "Surgical hemostasis is the process of stopping bleeding during an operation using physical or chemical means." "Acute coronary syndrome is a term used for any condition brought on by a sudden reduction or blockage of blood flow to the heart.")
          
          INDEX=$((RANDOM % 4))
          SUB=${SUBJECTS[$INDEX]}
          TOP=${TOPICS[$INDEX]}
          SCR=${SCRIPTS[$INDEX]}

          RESPONSE=$(curl -s -X POST https://api.shotstack.io/edit/v1/render \
          -H "x-api-key: ExZhq8U3rOIRgdUQDeIbar4vwtbM6GLAwn2Ei3Hq" \
          -H "Content-Type: application/json" \
          -d "{
                \"timeline\": {
                  \"soundtrack\": {\"src\": \"https://shotstack-assets.s3-ap-southeast-2.amazonaws.com/music/disco.mp3\", \"volume\": 0.1},
                  \"tracks\": [
                    {\"clips\": [{\"asset\": {\"type\": \"html\", \"html\": \"<div style='color:#00ffcc; text-align:center; font-family:Arial;'><h1 style='font-size:50px;'>$SUB</h1><h2 style='font-size:40px; color:#ffffff;'>$TOP</h2></div>\", \"width\": 1024, \"height\": 576}, \"start\": 0, \"length\": 12, \"effect\": \"zoomIn\", \"transition\": {\"in\": \"fade\", \"out\": \"slideRight\"}}]},
                    {\"clips\": [{\"asset\": {\"type\": \"tts\", \"text\": \"Welcome students. In $SUB we focus on $TOP. $SCR\", \"voice\": \"Matthew\"}, \"start\": 1, \"length\": 11}]}
                  ]
                },
                \"output\": {\"format\": \"mp4\", \"resolution\": \"sd\"}
              }")
          
          RID=$(echo $RESPONSE | jq -r '.response.id // "failed"')
          echo "$RID" > render_id.txt
          echo "🚀 Verified Render ID ($SUB): $RID"

      - name: 3. Execute Lead Hunters & YT Upload
        env:
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: |
          pip install google-api-python-client google-auth-oauthlib requests
          python3 outreach_specialist.py
          python3 google_lead_hunter.py
          python3 youtube_uploader.py
