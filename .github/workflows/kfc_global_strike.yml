name: 24-7 KFC Global Synthetic Factory

on:
  workflow_dispatch:
  schedule:
    - cron: '5 * * * *'

jobs:
  medical-strike:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Institutional Code
        uses: actions/checkout@v4

      - name: 2. Execute CBME Professor Agent
        id: media_strike
        run: |
          TOPICS=("Gout Metabolism" "Jaundice Types" "Renal Function" "Vitamin C Deficiency")
          SCRIPTS=("Gout is caused by hyper-uricemia leading to urate crystal deposition in joints." "Jaundice is the yellowing of skin due to bilirubin buildup from heme breakdown." "Renal function is assessed by glomerular filtration rate and serum creatinine levels." "Vitamin C is essential for collagen synthesis; its deficiency leads to scurvy.")
          INDEX=$((RANDOM % 4))
          
          RESPONSE=$(curl -s -X POST https://api.shotstack.io/edit/v1/render \
          -H "x-api-key: ExZhq8U3rOIRgdUQDeIbar4vwtbM6GLAwn2Ei3Hq" \
          -H "Content-Type: application/json" \
          -d "{
                \"timeline\": {
                  \"soundtrack\": {\"src\": \"https://shotstack-assets.s3-ap-southeast-2.amazonaws.com/music/disco.mp3\", \"volume\": 0.1},
                  \"tracks\": [
                    {\"clips\": [{\"asset\": {\"type\": \"html\", \"html\": \"<h1 style='color:#00ffcc;'>CBME: ${TOPICS[$INDEX]}</h1>\", \"width\": 1024, \"height\": 576}, \"start\": 0, \"length\": 10}]},
                    {\"clips\": [{\"asset\": {\"type\": \"tts\", \"text\": \"${SCRIPTS[$INDEX]}\", \"voice\": \"Matthew\"}, \"start\": 0, \"length\": 10}]}
                  ]
                },
                \"output\": {\"format\": \"mp4\", \"resolution\": \"sd\"}
              }")
          echo "RENDER_ID=$(echo $RESPONSE | jq -r '.response.id')" >> $GITHUB_ENV

      - name: 3. Execute Automatic YouTube Upload
        env:
          RENDER_ID: ${{ env.RENDER_ID }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: |
          pip install google-api-python-client google-auth-oauthlib requests
          python3 youtube_uploader.py
