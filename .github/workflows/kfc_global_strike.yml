- name: Agent 4 (Delivery Dispatch)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          sleep 10
          # DEEP SEARCH: Find any MP4 generated by Agent 3
          VIDEO=$(find . -name "*.mp4" | head -n 1)
          
          if [ -z "$VIDEO" ]; then
            echo "❌ ERROR: Agent 3 did not produce a video file."
            exit 1
          fi
          
          # Merge visuals with Agent 2's audio
          ffmpeg -y -i "$VIDEO" -i phd_voice.mp3 -c:v libx264 -crf 28 -c:a aac -shortest final.mp4
          
          python3 -c "import requests; f=open('final.mp4','rb'); requests.post(f'https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendVideo', data={'chat_id': '${{ secrets.TELEGRAM_CHAT_ID }}', 'caption': '🔬 PHD MULTI-AGENT SUCCESS: FULL-SCREEN FONT'}, files={'video': f})"
