name: 24-7 KFC Global Synthetic Factory

on:
  workflow_dispatch:
  schedule:
    - cron: '5 * * * *'

jobs:
  medical-strike:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Institutional Code
        uses: actions/checkout@v4

      - name: 2. Execute Media Agent (Hosted Render Strike)
        run: |
          # Unique ID to prevent de-duplication
          UNIQUE_ID=$RANDOM
          
          curl -X POST https://api.shotstack.io/edit/v1/render \
          -H "x-api-key: ExZhq8U3rOIRgdUQDeIbar4vwtbM6GLAwn2Ei3Hq" \
          -H "Content-Type: application/json" \
          -d "{
                \"timeline\": {
                  \"tracks\": [{
                    \"clips\": [{
                      \"asset\": {
                        \"type\": \"title\", 
                        \"text\": \"KFC LAB PhD Support #$UNIQUE_ID\",
                        \"style\": \"future\"
                      },
                      \"start\": 0, \"length\": 10
                    }]
                  }]
                },
                \"output\": {
                  \"format\": \"mp4\", 
                  \"resolution\": \"sd\"
                }
              }"

      - name: 3. Execute Lead Hunters
        env:
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: |
          pip install requests
          python3 outreach_specialist.py
          python3 google_lead_hunter.py

      - name: 4. Finalize Logs
        run: echo "✅ Factory Strike successfully queued. Check 'My Renders' for the video link."
