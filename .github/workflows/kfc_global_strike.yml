name: 24-7 KFC Global Synthetic Factory

on:
  workflow_dispatch:
  schedule:
    - cron: '5 * * * *'

jobs:
  medical-strike:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Institutional Code
        uses: actions/checkout@v4

      - name: 2. Generate Medical Video with Arcreel
        uses: arcreel/action@v1
        with:
          # 🎙️ Professor Matthew Script
          topic: "Clinical Biochemistry: Renal Function Tests"
          script: "Serum creatinine and urea are the primary biomarkers for kidney function. A rising creatinine level often indicates a decreasing G-F-R."
          style: "medical_professional"
          # This will save the video to a file named 'video.mp4' automatically
          output: "cbme_lesson.mp4"

      - name: 3. Execute Lead Hunters & YouTube Upload
        env:
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: |
          pip install google-api-python-client google-auth-oauthlib requests
          # 🚀 1. Start Author Hunting (Direct Journal Method)
          python3 google_lead_hunter.py
          
          # 🚀 2. Upload the video generated by Arcreel
          python3 youtube_uploader.py
