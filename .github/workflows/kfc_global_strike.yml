name: 24-7 KFC Global Synthetic Factory

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  emperor-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: System Initialization
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install requests gtts

      - name: Agent 01 - The Scout
        run: python3 lead_hunter.py

      - name: Agent 02 - The Scholar
        run: python3 script_generator.py

      - name: Agent 03 - The Scribe
        run: |
          python3 generate_voice.py
          python3 generate_subtitles.py

      - name: Agent 04 - The Director
        run: python3 render_video.py

      - name: Agent 05 - The Courier
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 telegram_courier.py
