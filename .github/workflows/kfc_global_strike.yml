name: 24-7 Multi-Agent PhD Factory
on: workflow_dispatch
jobs:
  run-agents:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg xvfb
          pip install manim gtts requests
      - name: Run Scholar & Orator
        run: |
          python3 scribe_agent.py
          python3 voice_agent.py
      - name: Run Architect
        run: xvfb-run -a python3 render_agent.py
      - name: Deliver
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          VIDEO=$(find . -name "*.mp4" | head -n 1)
          ffmpeg -y -i "$VIDEO" -i voice.mp3 -c:v libx264 -shortest final.mp4
          python3 -c "import requests; f=open('final.mp4','rb'); requests.post(f'https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendVideo', data={'chat_id': '${{ secrets.TELEGRAM_CHAT_ID }}'}, files={'video': f})"
