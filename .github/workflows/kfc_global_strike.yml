name: 24-7 KFC Global Synthetic Factory

on:
  workflow_dispatch:
  schedule:
    - cron: '5 * * * *'

jobs:
  medical-strike:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Institutional Code
        uses: actions/checkout@v4

      - name: 2. Execute Cinematic Media Agent
        id: media_strike
        run: |
          UNIQUE_ID=$RANDOM
          RESPONSE=$(curl -s -X POST https://api.shotstack.io/edit/v1/render \
          -H "x-api-key: ExZhq8U3rOIRgdUQDeIbar4vwtbM6GLAwn2Ei3Hq" \
          -H "Content-Type: application/json" \
          -d "{
                \"timeline\": {
                  \"soundtrack\": {
                    \"src\": \"https://s3-ap-southeast-2.amazonaws.com/shotstack-assets/music/glitch.mp3\",
                    \"effect\": \"fadeInFadeOut\"
                  },
                  \"background\": \"#000000\",
                  \"tracks\": [{
                    \"clips\": [{
                      \"asset\": {
                        \"type\": \"title\", 
                        \"text\": \"KFC LAB: PhD RESEARCH SUPPORT #$UNIQUE_ID\",
                        \"style\": \"future\"
                      },
                      \"start\": 0, \"length\": 6
                    }]
                  }]
                },
                \"output\": {\"format\": \"mp4\", \"resolution\": \"sd\"}
              }")
          
          RENDER_ID=$(echo $RESPONSE | jq -r '.response.id')
          echo "RENDER_ID=$RENDER_ID" >> $GITHUB_ENV
          echo "🚀 Render Queued: $RENDER_ID"

      - name: 3. Execute Lead Hunters
        env:
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: |
          pip install requests
          python3 outreach_specialist.py
          python3 google_lead_hunter.py

      - name: 4. Execute Video Delivery Agent (5-Minute Deep Wait)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          RENDER_ID: ${{ env.RENDER_ID }}
        run: |
          python3 -c "
          import os, requests, time
          render_id = os.getenv('RENDER_ID')
          api_key = 'ExZhq8U3rOIRgdUQDeIbar4vwtbM6GLAwn2Ei3Hq'
          token = os.getenv('TELEGRAM_TOKEN')
          
          print(f'🛰️ Monitoring Render: {render_id}')
          
          # Check every 60 seconds, up to 5 times (5 minutes total)
          for attempt in range(5):
              print(f'Attempt {attempt+1}: Waiting 60 seconds...')
              time.sleep(60)
              
              res = requests.get(f'https://api.shotstack.io/edit/v1/render/{render_id}', headers={'x-api-key': api_key}).json()
              status = res.get('response', {}).get('status')
              url = res.get('response', {}).get('url')
              
              print(f'📊 Current Status: {status}')
              
              if status == 'completed' and url:
                  msg = f'🎬 *KFC CINEMATIC READY*\n\nRender complete with music and visuals.\n🔗 [Download/Upload Video]({url})'
                  requests.post(f'https://api.telegram.org/bot{token}/sendMessage', json={'chat_id': '1060905337', 'text': msg, 'parse_mode': 'Markdown'})
                  print('✅ Link successfully delivered to Telegram.')
                  exit(0)
              
              if status == 'failed':
                  print('❌ Render failed on Shotstack servers.')
                  exit(1)
          
          print('⚠️ Timeout: Video not ready after 5 minutes.')
          "

      - name: 5. Finalize Factory Logs
        run: echo "✅ Hourly Factory Strike Completed."
