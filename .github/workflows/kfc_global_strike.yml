name: 24-7 KFC Global Synthetic Factory

on:
  workflow_dispatch:
  schedule:
    - cron: '5 * * * *'

jobs:
  medical-strike:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Institutional Code
        uses: actions/checkout@v4

      - name: 2. Core Business: Lead Hunting & Outreach
        env:
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: |
          pip install google-api-python-client google-auth-oauthlib requests
          # 🚀 Hunting & Emailing happens FIRST. This will NOT fail.
          python3 google_lead_hunter.py
          python3 outreach_specialist.py

      - name: 3. Video Factory: Arcreel & YouTube
        continue-on-error: true # 🛡️ If video fails, the job still marks as "Success"
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install arcreel
          # 🚀 Attempt video generation and upload
          python3 youtube_uploader.py
