name: 24-7 Multi-Agent PhD Factory

on:
  workflow_dispatch:

jobs:
  run-agents:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Agent Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg xvfb libcairo2-dev libpango1.0-dev \
          libjpeg-dev zlib1g-dev libfreetype6-dev
          pip install manim gtts requests

      - name: Run Agent 1 & 2 (Scholar & Orator)
        run: |
          python3 scribe_agent.py
          python3 voice_agent.py

      - name: Run Agent 3 (The Architect)
        run: xvfb-run -a python3 render_agent.py

      - name: Agent 4 (Delivery Dispatch)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          sleep 10
          # DEEP SEARCH: Find the MP4 produced by Agent 3
          VIDEO=$(find . -name "*.mp4" | head -n 1)
          
          if [ -z "$VIDEO" ]; then
            echo "❌ ERROR: Agent 3 did not produce a video file."
            exit 1
          fi
          
          # Merge visuals with Agent 2 audio
          ffmpeg -y -i "$VIDEO" -i phd_voice.mp3 -c:v libx264 -crf 28 -c:a aac -shortest final_masterclass.mp4
          
          python3 -c "import requests, os; f=open('final_masterclass.mp4','rb'); requests.post(f'https://api.telegram.org/bot{os.getenv(\"TELEGRAM_TOKEN\")}/sendVideo', data={'chat_id': os.getenv(\"TELEGRAM_CHAT_ID\"), 'caption': '🔬 PHD MULTI-AGENT SUCCESS: FULL-SCREEN FONT'}, files={'video': f})"
