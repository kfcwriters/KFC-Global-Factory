name: 24-7 KFC Global Revenue Engine
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  medical-strike:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Force Install Tools
        run: pip install requests google-api-python-client

      - name: Execute Full Autonomy Strike
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          TELEGRAM_CHAT_ID: "1060905337"
        run: python3 outbound_agent.py
