name: 24-7 KFC Global Synthetic Factory

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *' # Optimized to run every 6 hours to avoid Quota limits

jobs:
  medical-industrial-strike:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Institutional Environment Setup
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install requests gtts google-api-python-client google-auth-oauthlib

      - name: Execute Broad-Spectrum Outreach & Telegram Delivery
        env:
          # CRITICAL: These must match your GitHub Secret names exactly
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # YouTube Credentials (for when quota resets)
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        run: |
          python3 google_lead_hunter.py
          python3 youtube_uploader.py
