- name: Execute Sync Agent
        run: xvfb-run -a python3 master_agent.py

      - name: Deliver Masterclass
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # 1. Locate the video
          VIDEO=$(find . -name "PhDMasterclass.mp4" | head -n 1)
          
          # 2. HARD SYNC: Combine visuals and audio with zero drift
          # -shortest ensures both end at the exact same time
          ffmpeg -y -i "$VIDEO" -i phd_voice.mp3 -c:v libx264 -crf 28 -c:a aac -shortest final_masterclass.mp4
          
          # 3. Dispatch
          python3 -c "import requests, os; f=open('final_masterclass.mp4','rb'); requests.post(f'https://api.telegram.org/bot{os.getenv(\"TELEGRAM_TOKEN\")}/sendVideo', data={'chat_id': os.getenv(\"TELEGRAM_CHAT_ID\"), 'caption': '🔬 PHD SYNCED MASTERCLASS SUCCESS'}, files={'video': f})"
