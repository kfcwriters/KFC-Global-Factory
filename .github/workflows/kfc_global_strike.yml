name: 24-7 KFC Global Synthetic Factory

on:
  workflow_dispatch:

jobs:
  emperor-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Unlock Infrastructure
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick ghostscript fonts-liberation
          
          # Overwrite policy so "Big Text" is allowed
          cat <<EOF | sudo tee /etc/ImageMagick-6/policy.xml
          <policymap>
            <policy domain="coder" rights="read|write" pattern="*" />
            <policy domain="path" rights="read|write" pattern="*" />
            <policy domain="resource" name="memory" value="3GiB"/>
            <policy domain="resource" name="map" value="4GiB"/>
          </policymap>
          EOF

      - name: Setup Python
        run: |
          pip install requests gtts pysrt Pillow "moviepy==1.0.3" "numpy<2.0.0"

      - name: Generate PhD Content
        run: |
          python3 lead_hunter.py
          python3 sigma_lecture_generator.py
          # Voice Generation
          python3 -c "from gtts import gTTS; f=open('lecture_script.txt'); text=f.read(); gTTS(text).save('voice.mp3')"
          # Syncing Subtitles for the Viral Opener
          python3 -c "f=open('subtitles.srt','w'); [f.write(f'{i}\n00:00:{4*(i-1):02},000 --> 00:00:{4*i:02},000\nPHD MASTERCLASS: PART {i}\n\n') for i in range(1,50)]"

      - name: Render Viral Teaching Video
        run: python3 animate_subtitles.py

      - name: Send to Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 -c "import os, requests; url=f'https://api.telegram.org/bot{os.getenv(\"TELEGRAM_TOKEN\")}/sendVideo'; f=open('final_video.mp4','rb'); requests.post(url, data={'chat_id': os.getenv(\"TELEGRAM_CHAT_ID\"), 'caption': '🚀 VIRAL TEACHING VIDEO READY'}, files={'video': f})"
