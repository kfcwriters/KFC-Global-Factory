name: 24-7 KFC Global Synthetic Factory

on:
  workflow_dispatch:
  schedule:
    - cron: '5 * * * *'

jobs:
  medical-strike:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Setup
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install requests google-api-python-client google-auth-oauthlib arcreel

      - name: 3. Business (Leads & Emails)
        run: |
          export GMAIL_PASSWORD="${{ secrets.GMAIL_PASSWORD }}"
          python3 google_lead_hunter.py
          python3 outreach_specialist.py

      - name: 4. YouTube (720p Assets)
        run: |
          export ARCREEL_API_KEY="${{ secrets.ARCREEL_API_KEY }}"
          python3 youtube_uploader.py
