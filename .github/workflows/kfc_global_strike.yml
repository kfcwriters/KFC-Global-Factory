name: 24-7 KFC Global Synthetic Factory

on:
  workflow_dispatch:

jobs:
  emperor-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: System Initialization & Security Unlock
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick ghostscript fonts-liberation
          
          # NUCLEAR UNLOCK: Overwrite the entire policy file to allow everything
          cat <<EOF | sudo tee /etc/ImageMagick-6/policy.xml
          <policymap>
            <policy domain="coder" rights="read|write" pattern="*" />
            <policy domain="path" rights="read|write" pattern="*" />
            <policy domain="resource" name="memory" value="2GiB"/>
            <policy domain="resource" name="map" value="4GiB"/>
            <policy domain="resource" name="width" value="10KP"/>
            <policy domain="resource" name="height" value="10KP"/>
          </policymap>
          EOF

      - name: Install Python Packages
        run: |
          pip install requests gtts pysrt Pillow "moviepy==1.0.3" "numpy<2.0.0"

      - name: Agent 01-03 (Scout, Scholar, Scribe)
        run: |
          python3 lead_hunter.py
          python3 sigma_lecture_generator.py
          # Force a 3.5 minute limit on the audio generation
          python3 -c "from gtts import gTTS; f=open('lecture_script.txt'); text=f.read()[:2500]; gTTS(text).save('voice.mp3')"
          python3 -c "f=open('subtitles.srt','w'); [f.write(f'{i}\n00:00:{5*(i-1):02},000 --> 00:00:{5*i:02},000\nPHD RESEARCH STEP {i}\n\n') for i in range(1,41)]"

      - name: Agent 04 - The Motion Director
        run: python3 animate_subtitles.py

      - name: Agent 05 - The Courier
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Send directly; at 3 mins, it will be under 50MB
          python3 -c "import os, requests; url=f'https://api.telegram.org/bot{os.getenv(\"TELEGRAM_TOKEN\")}/sendVideo'; f=open('final_video.mp4','rb'); requests.post(url, data={'chat_id': os.getenv(\"TELEGRAM_CHAT_ID\"), 'caption': '🎬 3-MINUTE MASTERCLASS READY'}, files={'video': f})"
