name: 24-7 KFC Global Synthetic Factory

on:
  workflow_dispatch:
  schedule:
    - cron: '5 * * * *'

jobs:
  medical-strike:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Institutional Code
        uses: actions/checkout@v4

      - name: 2. Install Essentials
        run: pip install requests

      - name: 3. Run Lead Hunter
        run: python3 google_lead_hunter.py

      - name: 4. Run Outreach Agent
        env:
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        run: python3 outreach_specialist.py
