name: 24-7 PhD Long-Form Factory

on:
  workflow_dispatch:

jobs:
  emperor-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Academic Media Suite
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg xvfb libcairo2-dev libpango1.0-dev \
          libjpeg-dev zlib1g-dev libfreetype6-dev
          pip install manim gtts requests

      - name: Run Multi-Agent Sequence
        run: |
          # Step 1: Scholar writes the 1-2 minute technical script
          python3 scholar_agent.py
          
          # Step 2: Master Architect renders visuals with audio sync
          xvfb-run -a python3 master_agent.py

      - name: Deliver Masterclass
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          sleep 10
          VIDEO=$(find . -name "PhDMasterclass.mp4" | head -n 1)
          
          if [ -z "$VIDEO" ]; then
            echo "❌ ERROR: Render failed."
            exit 1
          fi
          
          # Perfect sync fusion for long-form content
          ffmpeg -y -i "$VIDEO" -i phd_voice.mp3 -c:v libx264 -crf 28 -c:a aac -shortest final_module.mp4
          
          python3 -c "import requests, os; f=open('final_module.mp4','rb'); requests.post(f'https://api.telegram.org/bot{os.getenv(\"TELEGRAM_TOKEN\")}/sendVideo', data={'chat_id': os.getenv(\"TELEGRAM_CHAT_ID\"), 'caption': '🔬 NEW LONG-FORM ACADEMIC MODULE UPLOADED'}, files={'video': f})"
