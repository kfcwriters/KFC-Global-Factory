name: 24-7 KFC Global Synthetic Factory

on:
  workflow_dispatch:
  schedule:
    - cron: '5 * * * *'

jobs:
  medical-strike:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Institutional Code
        uses: actions/checkout@v4

      - name: 2. Core Business: Leads & Outreach
        env:
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        run: |
          pip install requests
          python3 google_lead_hunter.py
          python3 outreach_specialist.py

      - name: 3. Video Engine: Install Arcreel
        continue-on-error: true
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install arcreel google-api-python-client google-auth-oauthlib

      - name: 4. YouTube: Publish 720p Assets
        continue-on-error: true
        env:
          ARCREEL_API_KEY: ${{ secrets.ARCREEL_API_KEY }}
        run: python3 youtube_uploader.py
