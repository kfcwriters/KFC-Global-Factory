name: 24-7 KFC Global Synthetic Factory

on:
  workflow_dispatch:
  schedule:
    - cron: '5 * * * *'

jobs:
  medical-strike:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Essentials
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install requests google-api-python-client google-auth-oauthlib

      - name: 1. Hunt & Email
        env:
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        run: |
          python3 google_lead_hunter.py
          python3 outreach_specialist.py

      - name: 2. Render & Upload (720p)
        run: python3 youtube_uploader.py
