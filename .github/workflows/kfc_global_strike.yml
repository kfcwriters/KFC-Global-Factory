name: 24-7 KFC Global Synthetic Factory

on:
  workflow_dispatch:

jobs:
  emperor-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Academic Media Suite
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libcairo2-dev libpango1.0-dev fonts-liberation xvfb
          pip install manim requests gtts

      - name: Generate PhD Assets (Audio Slicing Fix)
        run: |
          python3 lead_hunter.py
          python3 sigma_lecture_generator.py
          # Audio Slicing: Prevents gTTS API 200/Timeout Errors for long scripts
          python3 -c "
          import os
          from gtts import gTTS
          if os.path.exists('lecture_script.txt'):
              with open('lecture_script.txt', 'r') as f:
                  words = f.read().split()[:1200]
              
              # Split into 3 parts for maximum API stability
              third = len(words) // 3
              p1, p2, p3 = ' '.join(words[:third]), ' '.join(words[third:2*third]), ' '.join(words[2*third:])
              
              gTTS(p1).save('p1.mp3')
              gTTS(p2).save('p2.mp3')
              gTTS(p3).save('p3.mp3')
              
              # Seamlessly merge into one voiceover
              os.system('ffmpeg -y -i \"concat:p1.mp3|p2.mp3|p3.mp3\" -acodec copy voice.mp3')
              
              with open('lecture_script.txt', 'w') as f: f.write(' '.join(words))
          "

      - name: Render Masterclass (Maximum Font Edition)
        run: |
          # Clean workspace and prepare video output directory
          rm -rf media/
          mkdir -p media/videos
          xvfb-run -a python3 animate_subtitles.py

      - name: Deliver Masterclass
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Give the file system time to synchronize
          sleep 10
          VIDEO_PATH=$(find media/videos -name "TeachingMasterclass.mp4" | head -n 1)
          
          if [ -z "$VIDEO_PATH" ]; then
            echo "❌ ERROR: Render failed. Video file not generated."
            exit 1
          fi
          
          # Final Fusion: Merge the Scrolling Masterclass with the Voiceover
          ffmpeg -y -i "$VIDEO_PATH" -i voice.mp3 -c:v libx264 -crf 28 -c:a aac -shortest final_masterclass.mp4
          
          # Dispatch to Telegram Bot
          python3 -c "import os, requests; url=f'https://api.telegram.org/bot{os.getenv(\"TELEGRAM_TOKEN\")}/sendVideo'; f=open('final_masterclass.mp4','rb'); requests.post(url, data={'chat_id': os.getenv(\"TELEGRAM_CHAT_ID\"), 'caption': '🔬 PHD MASTERCLASS: MAX FONT SYNC READY'}, files={'video': f})"
