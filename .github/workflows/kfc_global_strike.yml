name: 24-7 KFC Global Synthetic Factory

on:
  workflow_dispatch:
  schedule:
    - cron: '5 * * * *'

jobs:
  medical-strike:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Institutional Code
        uses: actions/checkout@v4

      - name: 2. Install System Video Engine
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          
      - name: 3. Execute Medical Strike Agents
        env:
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: |
          # Install Arcreel and dependencies
          pip install arcreel google-api-python-client google-auth-oauthlib requests
          
          # 🚀 1. Start Author Hunting
          python3 google_lead_hunter.py
          
          # 🚀 2. Start Outreach
          python3 outreach_specialist.py

          # 🚀 3. Run Video Generation & YouTube Upload
          python3 youtube_uploader.py
