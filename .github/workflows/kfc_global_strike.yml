name: 24-7 PhD Factory Fixed

on:
  workflow_dispatch:

jobs:
  run-agents:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg xvfb libcairo2-dev libpango1.0-dev
          pip install manim gtts requests

      - name: Execute Master Agent
        run: xvfb-run -a python3 master_agent.py

      - name: Deliver
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # The ultimate search for the file
          VIDEO=$(find . -name "PhDMasterclass.mp4" | head -n 1)
          if [ -z "$VIDEO" ]; then echo "RENDER FAILED"; exit 1; fi
          
          ffmpeg -y -i "$VIDEO" -i phd_voice.mp3 -c:v libx264 -crf 28 -c:a aac -shortest final.mp4
          
          python3 -c "import requests, os; f=open('final.mp4','rb'); requests.post(f'https://api.telegram.org/bot{os.getenv(\"TELEGRAM_TOKEN\")}/sendVideo', data={'chat_id': os.getenv(\"TELEGRAM_CHAT_ID\")}, files={'video': f})"
