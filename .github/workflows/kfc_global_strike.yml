name: 24-7 PhD Dynamic Factory

on:
  workflow_dispatch:

jobs:
  emperor-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Academic Media Suite
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg xvfb libcairo2-dev libpango1.0-dev \
          libjpeg-dev zlib1g-dev libfreetype6-dev
          pip install manim gtts requests

      - name: Execute Dynamic Master Agent
        # Each run generates a different biochemistry topic
        run: xvfb-run -a python3 master_agent.py

      - name: Deliver Masterclass
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          sleep 10
          VIDEO=$(find . -name "PhDMasterclass.mp4" | head -n 1)
          
          if [ -z "$VIDEO" ]; then
            echo "❌ ERROR: Render failed."
            exit 1
          fi
          
          # Perfect sync fusion
          ffmpeg -y -i "$VIDEO" -i phd_voice.mp3 -c:v libx264 -crf 28 -c:a aac -shortest final_video.mp4
          
          python3 -c "import requests, os; f=open('final_video.mp4','rb'); requests.post(f'https://api.telegram.org/bot{os.getenv(\"TELEGRAM_TOKEN\")}/sendVideo', data={'chat_id': os.getenv(\"TELEGRAM_CHAT_ID\"), 'caption': '🔬 NEW PHD MODULE: DYNAMIC SYNC SUCCESS'}, files={'video': f})"
