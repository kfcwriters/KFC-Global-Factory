name: 24-7 KFC Global Synthetic Factory

on:
  workflow_dispatch:

jobs:
  emperor-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Professional Media Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-liberation libass-dev

      - name: Setup Python
        run: pip install requests gtts pysrt

      - name: Generate PhD Assets
        run: |
          python3 lead_hunter.py
          python3 sigma_lecture_generator.py
          # Audio Generation
          python3 -c "from gtts import gTTS; f=open('lecture_script.txt'); text=f.read(); gTTS(text).save('voice.mp3')"
          # Professional Subtitle Generation (Timed for teaching)
          python3 -c "f=open('subtitles.srt','w'); [f.write(f'{i}\n00:00:{5*(i-1):02},000 --> 00:00:{5*i:02},000\nPHD MASTERCLASS: {i}\n\n') for i in range(1,60)]"

      - name: Render Teaching Video (FFmpeg-Bake)
        run: python3 animate_subtitles.py

      - name: Courier Delivery
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 -c "import os, requests; url=f'https://api.telegram.org/bot{os.getenv(\"TELEGRAM_TOKEN\")}/sendVideo'; f=open('final_video.mp4','rb'); requests.post(url, data={'chat_id': os.getenv(\"TELEGRAM_CHAT_ID\"), 'caption': '🔬 NEW SYSTEM: FFmpeg Masterclass Ready'}, files={'video': f})"
