name: 24-7 KFC Global Synthetic Factory

on:
  workflow_dispatch:

jobs:
  emperor-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Academic Media Suite
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libcairo2-dev libpango1.0-dev fonts-liberation xvfb
          pip install manim requests gtts

      - name: Generate PhD Assets (Strict 1000 Words)
        run: |
          python3 lead_hunter.py
          python3 sigma_lecture_generator.py
          # HARD CAP: 1000 words exactly
          python3 -c "
          import os
          if os.path.exists('lecture_script.txt'):
              with open('lecture_script.txt', 'r') as f:
                  words = f.read().split()[:1000]
              clean_text = ' '.join(words)
              with open('lecture_script.txt', 'w') as f: f.write(clean_text)
              from gtts import gTTS
              gTTS(clean_text).save('voice.mp3')
          "

      - name: Render Segmented Masterclass (Manim)
        run: xvfb-run -a python3 animate_subtitles.py

      - name: Final Fusion & Delivery
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          VIDEO_PATH=$(find media/videos -name "TeachingMasterclass.mp4" | head -n 1)
          
          # FUSION: We loop the high-quality Manim chapters to fill the audio duration
          # This keeps the 'Manim look' but prevents the 45-min crash.
          ffmpeg -y -stream_loop -1 -i "$VIDEO_PATH" -i voice.mp3 \
          -map 0:v:0 -map 1:a:0 -c:v libx264 -crf 28 -c:a aac -shortest final_teaching_video.mp4
          
          python3 -c "import os, requests; url=f'https://api.telegram.org/bot{os.getenv(\"TELEGRAM_TOKEN\")}/sendVideo'; f=open('final_teaching_video.mp4','rb'); requests.post(url, data={'chat_id': os.getenv(\"TELEGRAM_CHAT_ID\"), 'caption': '🔬 PHD MASTERCLASS: CHAPTER ASSEMBLY READY'}, files={'video': f})"
