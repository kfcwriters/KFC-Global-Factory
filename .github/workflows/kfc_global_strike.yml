name: 24-7 Global Medical Outreach Strike

on:
  workflow_dispatch:

jobs:
  outreach-cycle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Global Lead Hunter
        run: python3 lead_hunter_global.py

      - name: Execute Email Dispatch
        env:
          # HARD-CODED USER: Replace with your actual Gmail address
          GMAIL_USER: "kfcwriters@gmail.com" 
          # SECRET INJECTION: Make sure GMAIL_PASSWORD in GitHub = tnhyxpgbnkykelze
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        run: python3 email_sender.py

      - name: Notify Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 -c "
          import requests, os
          if os.path.exists('business_leads.txt'):
              lead = open('business_leads.txt').readlines()[0].strip()
              msg = f'📬 OUTREACH COMPLETE\n{lead}\nStatus: Dispatched via Secure App Pass.'
              requests.post(f'https://api.telegram.org/bot{os.getenv(\"TELEGRAM_TOKEN\")}/sendMessage', 
                            data={'chat_id': os.getenv(\"TELEGRAM_CHAT_ID\"), 'text': msg})
          "
