name: 24-7 KFC Global Synthetic Factory

on:
  workflow_dispatch:
  schedule:
    - cron: '5 * * * *'

jobs:
  kfc-strike:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Institutional Environment
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install requests google-api-python-client google-auth-oauthlib

      - name: Execution: Hunt, Outreach & Upload
        env:
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        run: |
          python3 google_lead_hunter.py
          python3 outreach_specialist.py
          python3 youtube_uploader.py
