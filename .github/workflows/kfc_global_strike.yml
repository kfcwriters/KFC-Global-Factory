name: 24-7 KFC Global Synthetic Factory

on:
  workflow_dispatch:
  schedule:
    - cron: '5 * * * *'

jobs:
  medical-strike:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 1. Checkout Institutional Code
        uses: actions/checkout@v4

      - name: 2. Execute Medical Professor Agent
        id: media_strike
        continue-on-error: true # Ensures hunting continues even if Shotstack is down
        run: |
          # 🎙️ Professor Matthew: Clinical Research Script
          TOPIC="Excellence in Medical Manuscript Writing"
          SCRIPT="Academic publishing requires precision. KFC Lab provides PhD level support for original research and case reports."
          
          RESPONSE=$(curl -s -X POST https://api.shotstack.io/edit/v1/render \
          -H "x-api-key: ExZhq8U3rOIRgdUQDeIbar4vwtbM6GLAwn2Ei3Hq" \
          -H "Content-Type: application/json" \
          -d "{
                \"timeline\": {
                  \"soundtrack\": {\"src\": \"https://shotstack-assets.s3-ap-southeast-2.amazonaws.com/music/disco.mp3\", \"volume\": 0.1},
                  \"tracks\": [
                    {\"clips\": [{\"asset\": {\"type\": \"html\", \"html\": \"<h1 style='color:#00ffcc; text-align:center;'>$TOPIC</h1>\", \"width\": 1024, \"height\": 576}, \"start\": 0, \"length\": 10}]},
                    {\"clips\": [{\"asset\": {\"type\": \"tts\", \"text\": \"$SCRIPT\", \"voice\": \"Matthew\"}, \"start\": 1, \"length\": 9}]}
                  ]
                },
                \"output\": {\"format\": \"mp4\", \"resolution\": \"sd\"}
              }")
          
          # 💾 Physical Handshake for the Uploader
          RID=$(echo $RESPONSE | jq -r '.response.id // "failed"')
          echo "$RID" > render_id.txt
          echo "🚀 Verified Render ID: $RID"

      - name: 3. Execute Lead Hunters & YouTube Upload
        env:
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: |
          # Install Academic API libraries
          pip install google-api-python-client google-auth-oauthlib requests
          
          # 🚀 1. Start Deep Academic Hunting (Scopus/ResearchGate/PubMed)
          # This triggers your google_lead_hunter.py to find REAL authors
          python3 google_lead_hunter.py
          
          # 🛰️ 2. Attempt YouTube Upload (Waits 10 minutes)
          # If Render was 'failed', the script will automatically skip upload
          python3 youtube_uploader.py

      - name: 4. Factory Cleanup
        run: echo "✅ Hourly Academic Strike Completed."
