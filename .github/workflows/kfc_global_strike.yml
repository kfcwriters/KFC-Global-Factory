- name: 2. Execute Media Agent (Professional Unique Render)
        run: |
          # We create a unique timestamp so Shotstack sees this as a BRAND NEW video
          TIMESTAMP=$(date +'%H:%M')
          
          curl -X POST https://api.shotstack.io/edit/v1/render \
          -H "x-api-key: ExZhq8U3rOIRgdUQDeIbar4vwtbM6GLAwn2Ei3Hq" \
          -H "Content-Type: application/json" \
          -d "{
                \"timeline\": {
                  \"background\": \"#000000\",
                  \"tracks\": [{
                    \"clips\": [{
                      \"asset\": {
                        \"type\": \"title\", 
                        \"text\": \"KFC LAB: Clinical Update $TIMESTAMP\",
                        \"style\": \"future\"
                      },
                      \"start\": 0, \"length\": 8
                    }]
                  }]
                },
                \"output\": {
                  \"format\": \"mp4\", 
                  \"resolution\": \"sd\",
                  \"destinations\": [{
                    \"provider\": \"youtube\",
                    \"options\": {
                      \"title\": \"KFC LAB: Research Support [$TIMESTAMP]\",
                      \"description\": \"Professional medical writing and biochemistry analysis. Contact: kfcwriters@gmail.com\",
                      \"category\": \"27\",
                      \"privacy\": \"public\"
                    }
                  }]
                }
              }"
