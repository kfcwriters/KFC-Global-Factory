name: 24-7 KFC Global Synthetic Factory

on:
  workflow_dispatch:
  schedule:
    - cron: '5 * * * *'

jobs:
  medical-strike:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Institutional Code
        uses: actions/checkout@v4

      - name: 2. Execute CBME Professor Render
        id: media_strike
        run: |
          RESPONSE=$(curl -s -X POST https://api.shotstack.io/edit/v1/render \
          -H "x-api-key: ExZhq8U3rOIRgdUQDeIbar4vwtbM6GLAwn2Ei3Hq" \
          -H "Content-Type: application/json" \
          -d "{\"timeline\":{\"soundtrack\":{\"src\":\"https://shotstack-assets.s3-ap-southeast-2.amazonaws.com/music/disco.mp3\",\"volume\":0.1},\"tracks\":[{\"clips\":[{\"asset\":{\"type\":\"html\",\"html\":\"<h1 style='color:#00ffcc;'>CBME Lesson</h1>\",\"width\":1024,\"height\":576},\"start\":0,\"length\":10}]}]},\"output\":{\"format\":\"mp4\",\"resolution\":\"sd\"}}")
          echo "RENDER_ID=$(echo $RESPONSE | jq -r '.response.id')" >> $GITHUB_ENV

      - name: 3. Execute Lead Hunters & Automatic YouTube Upload
        env:
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          RENDER_ID: ${{ env.RENDER_ID }}
        run: |
          pip install google-api-python-client google-auth-oauthlib requests
          # 1. Hunt Leads while video renders
          python3 outreach_specialist.py
          python3 google_lead_hunter.py
          # 2. Upload video
          python3 youtube_uploader.py
