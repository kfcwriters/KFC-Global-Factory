name: 24-7 KFC Global Synthetic Factory

on:
  workflow_dispatch:
  schedule:
    - cron: '5 * * * *'

jobs:
  medical-strike:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Institutional Code
        uses: actions/checkout@v4

      - name: 2. Execute Media Agent (Professional Unique Render)
        run: |
          # Generate a unique ID to ensure a NEW render every hour
          UNIQUE_ID=$RANDOM
          
          curl -X POST https://api.shotstack.io/edit/v1/render \
          -H "x-api-key: ExZhq8U3rOIRgdUQDeIbar4vwtbM6GLAwn2Ei3Hq" \
          -H "Content-Type: application/json" \
          -d @- <<EOF
          {
            "timeline": {
              "background": "#000000",
              "tracks": [{
                "clips": [{
                  "asset": {
                    "type": "title", 
                    "text": "KFC LAB: Research Update #$UNIQUE_ID",
                    "style": "future"
                  },
                  "start": 0, "length": 8
                }]
              }]
            },
            "output": {
              "format": "mp4", 
              "resolution": "sd",
              "destinations": [{
                "provider": "youtube",
                "options": {
                  "title": "KFC LAB PhD Support Update $UNIQUE_ID",
                  "description": "Professional medical writing and biochemistry analysis.",
                  "category": "27",
                  "privacy": "public"
                }
              }]
            }
          }
          EOF

      - name: 3. Execute Lead Hunters (Academic & Commercial)
        env:
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: |
          pip install requests
          python3 outreach_specialist.py
          python3 google_lead_hunter.py

      - name: 4. Finalize Logs
        run: echo "✅ Hourly Triple-Strike Factory completed successfully."
