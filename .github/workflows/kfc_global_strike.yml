name: 24-7 KFC Global Synthetic Factory

on:
  workflow_dispatch:

jobs:
  emperor-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Professor Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libcairo2-dev libpango1.0-dev fonts-liberation xvfb
          pip install manim requests gtts

      - name: Generate PhD Assets (1000 Word Sync)
        run: |
          # 1. Run your existing lead and script generators
          python3 lead_hunter.py
          python3 sigma_lecture_generator.py
          
          # 2. HARD LIMIT: Force exactly 1000 words for a 6-7 minute video
          python3 -c "
          import os
          if os.path.exists('lecture_script.txt'):
              with open('lecture_script.txt', 'r') as f:
                  words = f.read().split()
              limited_text = ' '.join(words[:1000])
              with open('lecture_script.txt', 'w') as f:
                  f.write(limited_text)
              from gtts import gTTS
              gTTS(limited_text).save('voice.mp3')
          else:
              print('Script missing, check Agent 02')
          "

      - name: Render Visual Loop (3-Second Master)
        run: |
          # Render a high-quality 3-second loop with xvfb virtual display
          xvfb-run -a python3 animate_subtitles.py

      - name: Deliver Masterclass (Turbo-Merge)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Locate the Manim loop video
          VIDEO_PATH=$(find media/videos -name "TeachingLoop.mp4" | head -n 1)
          
          if [ -z "$VIDEO_PATH" ]; then
            echo "❌ ERROR: Animation file not found!"
            exit 1
          fi
          
          # THE STITCH: Loops the 3s video infinitely to match the 1000-word audio
          ffmpeg -y -stream_loop -1 -i "$VIDEO_PATH" -i voice.mp3 -map 0:v:0 -map 1:a:0 -c:v libx264 -crf 28 -c:a aac -shortest final_teaching_video.mp4
          
          # Telegram Delivery
          python3 -c "import os, requests; url=f'https://api.telegram.org/bot{os.getenv(\"TELEGRAM_TOKEN\")}/sendVideo'; f=open('final_teaching_video.mp4','rb'); r=requests.post(url, data={'chat_id': os.getenv(\"TELEGRAM_CHAT_ID\"), 'caption': '🔬 1000-WORD PHD LECTURE: SYNC SUCCESSFUL'}, files={'video': f}); print(r.text)"
