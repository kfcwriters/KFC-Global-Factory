name: 24-7 KFC Global Synthetic Factory

on:
  workflow_dispatch:
  schedule:
    - cron: '5 * * * *'

jobs:
  medical-strike:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Institutional Code
        uses: actions/checkout@v4

      - name: 2. Execute Medical Strike Agents
        env:
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: |
          # Install Arcreel and dependencies
          pip install arcreel google-api-python-client google-auth-oauthlib requests
          
          # 🚀 1. Run the Lead Hunter (Finding Real Authors)
          python3 google_lead_hunter.py
          
          # 🚀 2. Run the Outreach Specialist (Professional Pitch)
          # This handles the emails we found
          python3 outreach_specialist.py

          # 🚀 3. Run the Video Creator & YouTube Uploader
          # This will now use Arcreel internally to make the video
          python3 youtube_uploader.py
