- name: Agent 4 (Delivery Dispatch)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          sleep 15
          # AGGRESSIVE FINDER: Checks root and subfolders
          VIDEO=$(find . -name "PhDArchitect.mp4" | head -n 1)
          
          if [ -z "$VIDEO" ]; then
            echo "❌ ERROR: Render Agent 3 failed to produce output."
            exit 1
          fi
          
          # Fusion: Merge visuals with Agent 2 audio
          ffmpeg -y -i "$VIDEO" -i phd_voice.mp3 -c:v libx264 -crf 28 -c:a aac -shortest final.mp4
          
          python3 -c "import requests, os; f=open('final.mp4','rb'); requests.post(f'https://api.telegram.org/bot{os.getenv(\"TELEGRAM_TOKEN\")}/sendVideo', data={'chat_id': os.getenv(\"TELEGRAM_CHAT_ID\"), 'caption': '🔬 PHD MULTI-AGENT SUCCESS: FULL-SCREEN FONT READY'}, files={'video': f})"
