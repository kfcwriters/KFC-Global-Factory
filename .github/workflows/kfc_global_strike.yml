name: 24-7 KFC Global Revenue Engine
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  medical-strike:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Force Install Communication Tools
        run: |
          python -m pip install --upgrade pip
          pip install requests google-api-python-client

      - name: Execute Mass Medical Strike
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        run: python3 outbound_agent.py
