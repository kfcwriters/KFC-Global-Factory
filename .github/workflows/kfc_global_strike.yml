name: 24-7 KFC Global Synthetic Factory

on:
  workflow_dispatch:
  schedule:
    - cron: '5 * * * *'

jobs:
  medical-strike:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Institutional Code
        uses: actions/checkout@v4

      - name: 2. Execute Medical Professor Agent
        run: |
          # 📚 Broad Medical Topic
          TOPIC="Clinical Pathology and Manuscript Excellence"
          SCRIPT="Welcome. Today we discuss the importance of precise clinical documentation in medical research and publication."
          
          RESPONSE=$(curl -s -X POST https://api.shotstack.io/edit/v1/render \
          -H "x-api-key: ExZhq8U3rOIRgdUQDeIbar4vwtbM6GLAwn2Ei3Hq" \
          -H "Content-Type: application/json" \
          -d "{\"timeline\":{\"soundtrack\":{\"src\":\"https://shotstack-assets.s3-ap-southeast-2.amazonaws.com/music/disco.mp3\",\"volume\":0.1},\"tracks\":[{\"clips\":[{\"asset\":{\"type\":\"html\",\"html\":\"<h1 style='color:#00ffcc;'>$TOPIC</h1>\",\"width\":1024,\"height\":576},\"start\":0,\"length\":8}]},{\"clips\":[{\"asset\":{\"type\":\"tts\",\"text\":\"$SCRIPT\",\"voice\":\"Matthew\"},\"start\":1,\"length\":7}]}]},\"output\":{\"format\":\"mp4\",\"resolution\":\"sd\"}}")
          
          RID=$(echo $RESPONSE | jq -r '.response.id // "failed"')
          echo "$RID" > render_id.txt
          echo "🚀 Verified Render ID: $RID"

      - name: 3. Execute Global Author Hunter & YouTube Upload
        env:
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: |
          pip install google-api-python-client google-auth-oauthlib requests
          python3 outreach_specialist.py
          python3 google_lead_hunter.py
          python3 youtube_uploader.py
