name: 24-7 KFC Global Synthetic Factory

on:
  schedule:
    # Runs at 5 minutes past every hour
    - cron: '5 * * * *'
  workflow_dispatch: # Allows manual trigger for testing

jobs:
  medical-strike:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Institutional Code
        uses: actions/checkout@v4

      - name: 2. Set up Research Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. Install Global Dependencies
        # THIS IS THE CRITICAL FIX: Without this, the script crashes (Exit Code 1)
        run: pip install requests

      - name: 4. Execute Triple Autonomy Strike
        env:
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          # Pulls the secure key you just added to your secrets
          SHOTSTACK_KEY: ${{ secrets.SHOTSTACK_KEY }}
        run: |
          echo "🚀 Executing Agent 1: PubMed Hunter..."
          python3 outreach_specialist.py
          
          echo "🚀 Executing Agent 2: Media Producer..."
          python3 media_producer.py
          
          echo "🚀 Executing Agent 3: Google Lead Hunter..."
          python3 google_lead_hunter.py

      - name: 5. Finalize Global Logs
        run: echo "✅ Factory Strike successfully completed."
