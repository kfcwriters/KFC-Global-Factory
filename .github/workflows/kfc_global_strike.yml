name: 24-7 KFC Global Synthetic Factory

on:
  workflow_dispatch:
  schedule:
    - cron: '5 * * * *'

jobs:
  medical-strike:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Setup (Video Engine + Libraries)
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install requests google-api-python-client google-auth-oauthlib arcreel

      - name: 3. Strike (Leads & Outreach)
        env:
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        run: |
          python3 google_lead_hunter.py
          python3 outreach_specialist.py

      - name: 4. Upload (Clinical Assets)
        run: python3 youtube_uploader.py
