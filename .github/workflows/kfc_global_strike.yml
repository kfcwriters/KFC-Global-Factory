name: 24-7 KFC Global Synthetic Factory

on:
  workflow_dispatch:

jobs:
  emperor-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Media Suite
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libcairo2-dev libpango1.0-dev fonts-liberation xvfb
          pip install manim requests gtts

      - name: Generate PhD Assets (1200 Word Guard)
        run: |
          python3 lead_hunter.py
          python3 sigma_lecture_generator.py
          # 1200 words = 10 mins. Strict cap for stability.
          python3 -c "
          import os
          if os.path.exists('lecture_script.txt'):
              with open('lecture_script.txt', 'r') as f:
                  words = f.read().split()[:1200]
              text = ' '.join(words)
              with open('lecture_script.txt', 'w') as f: f.write(text)
              from gtts import gTTS
              gTTS(text).save('voice.mp3')
          "

      - name: Render High-Speed Masterclass
        run: xvfb-run -a python3 animate_subtitles.py

      - name: Deliver Masterclass
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          VIDEO_PATH=$(find media/videos -name "TeachingMasterclass.mp4" | head -n 1)
          ffmpeg -y -i "$VIDEO_PATH" -i voice.mp3 -c:v libx264 -crf 28 -c:a aac -shortest final_video.mp4
          python3 -c "import os, requests; url=f'https://api.telegram.org/bot{os.getenv(\"TELEGRAM_TOKEN\")}/sendVideo'; f=open('final_video.mp4','rb'); requests.post(url, data={'chat_id': os.getenv(\"TELEGRAM_CHAT_ID\"), 'caption': '🔬 10-MINUTE PHD MASTERCLASS: FAST-RENDER SUCCESSFUL'}, files={'video': f})"
