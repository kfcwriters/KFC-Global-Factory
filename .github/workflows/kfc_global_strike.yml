- name: Install Professor Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libcairo2-dev libpango1.0-dev freeglut3-dev mesa-utils libpng-dev libjpeg-dev
          pip install manim requests gtts

      - name: Generate PhD Assets
        run: |
          python3 lead_hunter.py
          python3 sigma_lecture_generator.py
          # Audio Generation
          python3 -c "from gtts import gTTS; f=open('lecture_script.txt'); text=f.read(); gTTS(text).save('voice.mp3')"

      - name: Render Professional Animation (Manim)
        run: python3 animate_subtitles.py

      - name: Deliver Masterclass
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Manim outputs to a specific folder
          VIDEO_PATH=$(find media/videos -name "TeachingMasterclass.mp4")
          python3 -c "import os, requests; url=f'https://api.telegram.org/bot{os.getenv(\"TELEGRAM_TOKEN\")}/sendVideo'; f=open('$VIDEO_PATH','rb'); requests.post(url, data={'chat_id': os.getenv(\"TELEGRAM_CHAT_ID\"), 'caption': '🔬 MANIM MASTERCLASS: Word-by-Word Teaching Animation Ready.'}, files={'video': f})"
