name: 🎵 Weekly Suno Romantic Song Video

on:
  schedule:
    # Every Saturday at 3:30 PM UTC = 9:00 PM IST
    # Saturday evening = peak romantic content viewing time
    - cron: "30 15 * * 6"

  workflow_dispatch:

jobs:
  suno-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: 🔧 System dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg fonts-dejavu-core fonts-liberation
      - name: 📥 Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install SunoAI --quiet
      - name: 🎵 Run Pipeline
        env:
          HF_TOKEN:            ${{ secrets.HF_TOKEN }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          APIFRAME_KEY:        ${{ secrets.APIFRAME_KEY }}
          SUNO_COOKIE:         ${{ secrets.SUNO_COOKIE }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: python suno_pipeline.py
      - name: 📋 Logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs
          path: "*.log"
          retention-days: 7
