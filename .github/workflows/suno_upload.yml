name: 🎵 Weekly Suno Romantic Song Video

on:
  schedule:
    # Every Saturday at 3:30 PM UTC = 9:00 PM IST
    - cron: "30 15 * * 6"
  workflow_dispatch:

jobs:
  suno-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 🔧 System dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg fonts-dejavu-core fonts-liberation

      - name: 📥 Python dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      - name: 🎵 Run Weekly Romantic Song Pipeline
        env:
          HF_TOKEN:            ${{ secrets.HF_TOKEN }}
          APIFRAME_KEY:        ${{ secrets.APIFRAME_KEY }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: python suno_pipeline.py

      - name: 📋 Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: suno-failure-logs
          path: "*.log"
          retention-days: 7
