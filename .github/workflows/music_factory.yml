name: Zero-Touch Audio Success Factory

on:
  workflow_dispatch:

jobs:
  production:
    runs-on: ubuntu-latest
    steps:
      - name: Step 1 Checkout Repo
        uses: actions/checkout@v4

      - name: Step 2 Install System Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl

      - name: Step 3 AI Music Composer
        # This creates a rhythmic 'Heartbeat' pulse (100Hz and 150Hz)
        # We use tremolo to create a 'thumping' romantic rhythm
        run: |
          ffmpeg -f lavfi -i "sine=f=100:d=25" -f lavfi -i "sine=f=150:d=25" \
          -filter_complex "[0:a][1:a]amix=inputs=2:duration=longest,tremolo=f=3:d=0.9,aecho=0.8:0.9:1000:0.3,lowpass=f=500,volume=10.0" \
          ai_song.wav

      - name: Step 4 Visual Specialist
        run: curl -L -o bg.jpg "https://images.unsplash.com/photo-1518621736915-f3b1c41bfd00?q=80&w=1080&h=1920&auto=format&fit=crop"

      - name: Step 5 Emperor Merge
        run: |
          # We push the volume to the absolute limit (volume=4.0) 
          ffmpeg -y -loop 1 -i bg.jpg -i ai_song.wav -c:v libx264 -t 25 -pix_fmt yuv420p \
          -vf "scale=1080:1920,format=yuv420p" -c:a aac -b:a 256k -ar 44100 -ac 2 \
          -af "loudnorm=I=-14:TP=-1:LRA=11,volume=4.0" -shortest final_video.mp4

      - name: Step 6 Telegram Delivery
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -F chat_id=$TELEGRAM_CHAT_ID -F video=@"final_video.mp4" -F caption="🎼 SUCCESS: The Heartbeat Romantic Short is Ready!" https://api.telegram.org/bot$TELEGRAM_TOKEN/sendVideo
