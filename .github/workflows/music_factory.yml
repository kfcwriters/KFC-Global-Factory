name: Zero-Touch Audio Success Factory

on:
  workflow_dispatch:

jobs:
  production:
    runs-on: ubuntu-latest
    steps:
      - name: Step 1 Checkout Repo
        uses: actions/checkout@v4

      - name: Step 2 Install System Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl

      - name: Step 3 AI Music Composer (Lo-Fi Pulse)
        run: |
          # This generates a layered romantic beat:
          # 1. Low frequency pulse (110Hz)
          # 2. Vinyl texture/noise for 'mood'
          # 3. Vibrato and Echo for rhythm
          ffmpeg -f lavfi -i "sine=f=110:d=25" -f lavfi -i "noise=alls=0.01:allf=t:allp=1" \
          -filter_complex "[0:a]vibrato=f=6:d=0.8,aecho=0.8:0.9:1000:0.3,lowpass=f=400[m];[1:a]highpass=f=2000,volume=0.05[n];[m][n]amix=inputs=2:duration=longest,volume=5.0" \
          ai_song.wav

      - name: Step 4 Visual Specialist
        run: curl -L -o bg.jpg "https://images.unsplash.com/photo-1518621736915-f3b1c41bfd00?q=80&w=1080&h=1920&auto=format&fit=crop"

      - name: Step 5 Emperor Merge (Loud Stereo Fix)
        run: |
          # Increased volume to 3.0x and forced Stereo AAC
          ffmpeg -y -loop 1 -i bg.jpg -i ai_song.wav -c:v libx264 -t 25 -pix_fmt yuv420p \
          -vf "scale=1080:1920,format=yuv420p" -c:a aac -b:a 256k -ar 44100 -ac 2 \
          -af "loudnorm=I=-14:TP=-1:LRA=11,volume=3.0" -shortest final_video.mp4

      - name: Step 6 Telegram Delivery
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -F chat_id=$TELEGRAM_CHAT_ID -F video=@"final_video.mp4" -F caption="🎼 SUCCESS: The LOUD Lo-Fi Romantic Short is Here!" https://api.telegram.org/bot$TELEGRAM_TOKEN/sendVideo
