name: AI Music Short Factory (Short-Only Script)

on:
  workflow_dispatch: 

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libcairo2-dev libpango1.0-dev freeglut3-dev mesa-utils xvfb fonts-indic
          pip install manim

      - name: Generate 15-Second High-Quality Audio
        # This command creates a 15-second high-quality audio file 
        # specifically for this short so there is NO NEED to cut later.
        run: |
          curl -L -o raw_music.mp3 "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"
          ffmpeg -ss 00:00:10 -i raw_music.mp3 -t 00:00:15 -acodec libmp3lame -ab 192k short_audio.mp3

      - name: Render Video (Shorts Optimized)
        run: xvfb-run manim -ql -r 720,1280 music_gen.py NeonLyrics --format=mp4

      - name: Send to Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Finds the video and sends it immediately
          VIDEO_FILE=$(find media/videos -name "*.mp4" | head -n 1)
          
          # Final compression to ensure it stays under 10MB
          ffmpeg -i "$VIDEO_FILE" -vcodec libx264 -crf 28 -preset faster -y final_short.mp4
          
          curl -F chat_id=$TELEGRAM_CHAT_ID \
               -F video=@"final_short.mp4" \
               -F caption="✅ SHORT-ONLY SCRIPT: 15 Seconds of Perfection." \
               https://api.telegram.org/bot$TELEGRAM_TOKEN/sendVideo
