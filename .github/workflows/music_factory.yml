name: AI Music Short Factory (Emperor Fix v2)

on:
  workflow_dispatch: 

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libcairo2-dev libpango1.0-dev freeglut3-dev mesa-utils xvfb
          pip install manim requests

      - name: Download Haryanvi Audio
        run: curl -L -o haryanvi_beat.mp3 "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"

      - name: Render Visuals Only
        run: xvfb-run manim -ql -r 720,1280 music_gen.py NeonLyrics -t 15 --format=mp4

      - name: EMPEROR MERGE (Force Path Sync)
        run: |
          # The "Wildcard Force": Finds ANY video file in the media directory
          VIDEO_FILE=$(find media -type f \( -name "*.mp4" -o -name "*.mov" \) | head -n 1)
          
          if [ -z "$VIDEO_FILE" ]; then
            echo "CRITICAL ERROR: Visuals not found!"
            # List files to debug if it fails again
            ls -R media
            exit 1
          fi
          
          echo "Success! Found visual at: $VIDEO_FILE"
          
          # Force the merge using your successful Emperor Pipeline logic
          ffmpeg -y -i "$VIDEO_FILE" -i haryanvi_beat.mp3 -c:v libx264 -c:a aac -shortest final_short.mp4

      - name: Send to Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -f "final_short.mp4" ]; then
            curl -F chat_id=$TELEGRAM_CHAT_ID \
                 -F video=@"final_short.mp4" \
                 -F caption="✅ EMPEROR SUCCESS: Proper Haryanvi Short Delivered!" \
                 https://api.telegram.org/bot$TELEGRAM_TOKEN/sendVideo
          else
            echo "Error: final_short.mp4 not created!"
            exit 1
          fi
