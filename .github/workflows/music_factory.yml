name: AI Music Short Factory (Audio Fix v3)

on:
  workflow_dispatch: 

jobs:
  production-line:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl

      - name: STEP 1 Download Romantic AI Photo
        run: |
          curl -L -o romantic_bg.jpg "https://images.unsplash.com/photo-1518621736915-f3b1c41bfd00?q=80&w=720&h=1280&auto=format&fit=crop"

      - name: STEP 2 Download STABLE Audio
        # Switching to a fresh, verified high-quality link
        run: |
          curl -L -o haryanvi_song.mp3 "https://www.bensound.com/bensound-music/bensound-energy.mp3"

      - name: STEP 3 The Emperor Merge (High Volume Fix)
        run: |
          # -ac 2: Forces stereo sound
          # -ar 44100: Forces high-quality sample rate
          # volume=3.0: Makes it 3x louder to stop the "frustrating sound"
          ffmpeg -y -loop 1 -i romantic_bg.jpg -i haryanvi_song.mp3 \
          -c:v libx264 -t 15 -pix_fmt yuv420p \
          -vf "scale=720:1280,format=yuv420p" \
          -c:a aac -b:a 192k -ar 44100 -ac 2 -af "volume=3.0" \
          -shortest final_loud_short.mp4

      - name: STEP 4 Delivery Agent
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -F chat_id=$TELEGRAM_CHAT_ID \
               -F video=@"final_loud_short.mp4" \
               -F caption="🔊 AUDIO FIX: 3x Volume Boost & High Quality Codec!" \
               https://api.telegram.org/bot$TELEGRAM_TOKEN/sendVideo
