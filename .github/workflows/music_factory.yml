name: Zero-Touch AI Factory

on:
  workflow_dispatch:

jobs:
  production:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl python3-pip
          pip install scipy torch git+https://github.com/facebookresearch/audiocraft.git

      - name: Run Music Composer Agent
        run: python3 composer.py

      - name: Download Visuals
        run: curl -L -o bg.jpg "https://images.unsplash.com/photo-1518621736915-f3b1c41bfd00?q=80&w=1080&h=1920&auto=format&fit=crop"

      - name: Emperor Merge
        run: |
          ffmpeg -y -loop 1 -i bg.jpg -i ai_song.wav \
          -c:v libx264 -t 25 -pix_fmt yuv420p -vf "scale=1080:1920,format=yuv420p" \
          -c:a aac -b:a 192k -af "loudnorm=I=-16:TP=-1.5:LRA=11,volume=2.0" \
          -shortest final_video.mp4

      - name: Telegram Delivery
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -F chat_id=$TELEGRAM_CHAT_ID \
               -F video=@"final_video.mp4" \
               -F caption="🤖 AUTO-GEN SUCCESS: Pure AI Music & Visuals." \
               https://api.telegram.org/bot$TELEGRAM_TOKEN/sendVideo
