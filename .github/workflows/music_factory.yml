name: AI Original Music Factory

on:
  workflow_dispatch:

jobs:
  production:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl

      - name: Download Background
        run: curl -L -o romantic_bg.jpg "https://images.unsplash.com/photo-1518621736915-f3b1c41bfd00?q=80&w=720&h=1280&auto=format&fit=crop"

      - name: Emperor Merge
        run: |
          ffmpeg -y -loop 1 -i romantic_bg.jpg -i romantic_song.mp3 \
          -c:v libx264 -t 25 -pix_fmt yuv420p -vf "scale=720:1280,format=yuv420p" \
          -c:a aac -b:a 256k -ar 44100 -af "loudnorm=I=-16:TP=-1.5:LRA=11,volume=2.0" \
          -shortest final_romantic_hit.mp4

      - name: Telegram Delivery
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -F chat_id=$TELEGRAM_CHAT_ID \
               -F video=@"final_romantic_hit.mp4" \
               -F caption="🎼 SUCCESS: Original AI Song & Romantic Visuals!" \
               https://api.telegram.org/bot$TELEGRAM_TOKEN/sendVideo
