name: AI Music Shorts Factory

on:
  schedule:
    # Runs at 7:00 AM and 7:00 PM IST (1:30 AM & 1:30 PM UTC)
    - cron: '30 1,13 * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libcairo2-dev libpango1.0-dev freeglut3-dev mesa-utils xvfb

      - name: Install Python Libraries
        run: |
          pip install manim google-api-python-client google-auth-oauthlib requests

      - name: Render Romantic Short (Manim)
        # This uses the Manim script we discussed earlier
        run: manim -ql --pixel_height 1920 --pixel_width 1080 music_gen.py NeonLyrics

      - name: Execute Auto-Upload
        env:
          # Using the new credentials from your screenshot
          YT_CLIENT_ID: ${{ secrets.NEW_YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.NEW_YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.NEW_YT_REFRESH_TOKEN }}
        run: python uploader.py
