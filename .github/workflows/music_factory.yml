name: AI Original Music Factory

on:
  workflow_dispatch:

jobs:
  production:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Agent 0 Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg xvfb fonts-indic
          pip install manim

      - name: Agent 1 Visual Artist
        run: xvfb-run manim -ql -r 720,1280 visual_agent.py VisualShort -t 25 --format=mp4

      - name: Agent 2 Emperor Merge
        run: |
          # Finds the silent video rendered by Agent 1
          VIDEO=$(find media -name "*.mp4" | head -n 1)
          # Merges with the NEW romantic song you upload to your repo
          ffmpeg -y -i "$VIDEO" -i romantic_song.mp3 -c:v copy -c:a aac -b:a 256k -af "volume=2.0" -shortest final_romantic_hit.mp4

      - name: Agent 3 Telegram Delivery
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -F chat_id=$TELEGRAM_CHAT_ID \
               -F video=@"final_romantic_hit.mp4" \
               -F caption="🎼 NEW ORIGINAL HIT: Created by Multi-Agent Factory." \
               https://api.telegram.org/bot$TELEGRAM_TOKEN/sendVideo
