name: AI Music Review Factory (Fixed Format)

on:
  workflow_dispatch: 

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libcairo2-dev libpango1.0-dev freeglut3-dev mesa-utils xvfb
          pip install manim requests

      - name: Download Audio
        run: curl -L -o background_music.mp3 "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"

      - name: Render 15-Second Short
        # --format=mp4 forces the correct extension
        # -t 15 stops the render at 15 seconds
        run: xvfb-run manim -ql -r 720,1280 music_gen.py NeonLyrics -t 15 --format=mp4

      - name: Send to Telegram Review
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Finds any video file in the media folder, regardless of extension
          VIDEO_PATH=$(find media/videos -type f \( -name "*.mp4" -o -name "*.mov" \) | head -n 1)
          
          if [ -n "$VIDEO_PATH" ]; then
            echo "Uploading: $VIDEO_PATH"
            curl -F chat_id=$TELEGRAM_CHAT_ID \
                 -F video=@"$VIDEO_PATH" \
                 -F caption="✅ 15-Sec Haryanvi Short Rendered Successfully!" \
                 https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendVideo
          else
            echo "Error: No video file found!"
            exit 1
          fi
