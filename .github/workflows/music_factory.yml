name: AI Music Short Factory (Emperor Style)

on:
  workflow_dispatch: 

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libcairo2-dev libpango1.0-dev freeglut3-dev mesa-utils xvfb
          pip install manim requests

      - name: Download Haryanvi Audio
        run: curl -L -o haryanvi_beat.mp3 "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"

      - name: Render Visuals Only
        run: xvfb-run manim -ql -r 720,1280 music_gen.py NeonLyrics -t 15 --format=mp4

      - name: EMPEROR MERGE (Perfect Audio + Subtitle Sync)
        run: |
          # 1. Find the silent video we just rendered
          VIDEO=$(find media/videos -name "*.mp4" | head -n 1)
          
          # 2. Use your successful PhD Pipeline logic to merge
          # -c:v copy keeps the video perfect | -shortest clips audio to match video
          ffmpeg -y -i "$VIDEO" -i haryanvi_beat.mp3 -c:v libx264 -c:a aac -shortest final_module.mp4

      - name: Send to Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -F chat_id=$TELEGRAM_CHAT_ID \
               -F video=@"final_module.mp4" \
               -F caption="🕺 EMPEROR STRIKE: Haryanvi Music Short Live!" \
               https://api.telegram.org/bot$TELEGRAM_TOKEN/sendVideo
