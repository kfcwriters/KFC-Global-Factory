name: AI Music Review Factory (Compressed 720p)

on:
  workflow_dispatch: 

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libcairo2-dev libpango1.0-dev freeglut3-dev mesa-utils xvfb
          pip install manim requests

      - name: Download Audio
        run: curl -L -o background_music.mp3 "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"

      - name: Render 15-Second Short
        run: xvfb-run manim -ql -r 720,1280 music_gen.py NeonLyrics -t 15 --format=mp4

      - name: Compress for Telegram
        run: |
          RAW_VIDEO=$(find media/videos -type f \( -name "*.mp4" -o -name "*.mov" \) | head -n 1)
          # This command compresses the video to a much smaller size
          ffmpeg -i "$RAW_VIDEO" -vcodec libx264 -crf 28 -preset faster -y compressed_short.mp4

      - name: Send to Telegram Review
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -f "compressed_short.mp4" ]; then
            curl -F chat_id=$TELEGRAM_CHAT_ID \
                 -F video=@"compressed_short.mp4" \
                 -F caption="✅ 720p Short (Compressed for Telegram)" \
                 https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendVideo
          else
            echo "Error: Compressed file not found!"
            exit 1
          fi
