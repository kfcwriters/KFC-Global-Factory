name: AI Music Short Factory (Multi-Agent Setup)

on:
  workflow_dispatch: 

jobs:
  production-line:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg xvfb fonts-indic
          pip install manim

      - name: STEP 1 Audio Agent - Prepare 15s Song
        run: |
          curl -L -o raw_song.mp3 "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"
          ffmpeg -ss 00:00:05 -i raw_song.mp3 -t 15 -af "volume=2.0" -acodec libmp3lame -y perfect_audio.mp3

      - name: STEP 2 Visual Agent - Render Silent 15s Video
        run: xvfb-run manim -ql -r 720,1280 visual_agent.py VisualLyrics -t 15 --format=mp4

      - name: STEP 3 The Emperor Merge - Final Marriage
        run: |
          VIDEO=$(find media -name "*.mp4" | head -n 1)
          ffmpeg -y -i "$VIDEO" -i perfect_audio.mp3 -map 0:v:0 -map 1:a:0 -c:v libx264 -crf 28 -c:a aac -b:a 192k -shortest final_hit.mp4

      - name: STEP 4 Delivery Agent - Send to Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -F chat_id=$TELEGRAM_CHAT_ID \
               -F video=@"final_hit.mp4" \
               -F caption="🕺 MULTI-AGENT SUCCESS: 15-Sec Short with LOUD AUDIO!" \
               https://api.telegram.org/bot$TELEGRAM_TOKEN/sendVideo
