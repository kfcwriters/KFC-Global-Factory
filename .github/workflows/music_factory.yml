name: Bark AI Singing Factory

on:
  workflow_dispatch:

jobs:
  production:
    runs-on: ubuntu-latest
    steps:
      - name: Step 1 Checkout
        uses: actions/checkout@v4

      - name: Step 2 Install AI Singer Engine
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl
          pip install git+https://github.com/suno-ai/bark.git

      - name: Step 3 AI Vocalist (The Singing Agent)
        run: |
          # This Python script tells the Bark AI to 'Sing' the lyrics
          # Using [music] and [lyrics] tags forces the AI to use a singing melody
          python3 - <<EOF
          from bark import SAMPLE_RATE, generate_audio, preload_models
          from scipy.io.wavfile import write
          
          preload_models()
          
          # [music] tag tells the AI to create a melody while singing
          text_prompt = """
          ♪ Teri aankhon ka noor, dil gaya mera choor ♪
          ♪ Moonlight mein hum, udte hain kitni door ♪
          """
          
          audio_array = generate_audio(text_prompt)
          write("singing_vocals.wav", SAMPLE_RATE, audio_array)
          EOF

      - name: Step 4 Music Production (Beat)
        run: |
          # Creating a deep romantic pulse to go under the AI singer
          ffmpeg -f lavfi -i "sine=f=110:d=25,tremolo=f=3:d=0.5" \
                 -f lavfi -i "sine=f=220:d=25,vibrato=f=4:d=0.4" \
                 -filter_complex "amix=inputs=2:duration=longest,aecho=0.8:0.9:1000:0.3,volume=3.5" \
                 beat.wav

      - name: Step 5 Final Master Mix
        run: |
          # Mixing the Bark AI vocals with the beat
          ffmpeg -i beat.wav -i singing_vocals.wav -filter_complex "[0:a]volume=0.7[a0];[1:a]volume=2.0[a1];[a0][a1]amix=inputs=2:duration=longest,loudnorm" final_song.wav
          
          # Visuals and Video
          curl -L -o bg.jpg "https://images.unsplash.com/photo-1518621736915-f3b1c41bfd00?q=80&w=1080&h=1920&auto=format&fit=crop"
          ffmpeg -y -loop 1 -i bg.jpg -i final_song.wav -c:v libx264 -t 25 -pix_fmt yuv420p -vf "scale=1080:1920,format=yuv420p" -c:a aac -b:a 256k youtube_ready.mp4

      - name: Step 6 Telegram Delivery
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -F chat_id=$TELEGRAM_CHAT_ID -F video=@"youtube_ready.mp4" -F caption="🎵 BARK AI SUCCESS: Real Generative Singing Delivered!" https://api.telegram.org/bot$TELEGRAM_TOKEN/sendVideo
