name: Internal Harmony Master

on:
  workflow_dispatch:

jobs:
  production:
    runs-on: ubuntu-latest
    steps:
      - name: Step 1 Checkout
        uses: actions/checkout@v4

      - name: Step 2 Setup Audio Tools
        run: sudo apt-get update && sudo apt-get install -y ffmpeg curl

      - name: Step 3 Melodic AI Vocalist (Internal)
        # This agent uses 'Granular Synthesis' to turn a frequency into a 
        # breathing, melodic 'Singing' tone (Romance language style)
        run: |
          ffmpeg -f lavfi -i "sine=f=440:d=25" -af \
          "vibrato=f=5:d=0.5,chorus=0.7:0.9:55:0.4:0.25:2,aecho=0.8:0.88:60:0.4,volume=2.0" \
          vocalist.wav

      - name: Step 4 Neo-Soul Instrumental (Internal)
        # Layering three lush frequencies to create a professional background
        run: |
          ffmpeg -f lavfi -i "sine=f=110:d=25" -f lavfi -i "sine=f=165:d=25" -f lavfi -i "sine=f=220:d=25" \
          -filter_complex "[0:a]volume=1.0[b];[1:a]volume=0.5[m];[2:a]volume=0.3[h];[b][m][h]amix=inputs=3:duration=longest,aecho=0.8:0.9:1000:0.3,lowpass=f=800,volume=3.5" \
          instrumental.wav

      - name: Step 5 Master Studio Mix
        run: |
          # Mixing the 'Breathing' vocalist with the Neo-Soul track
          ffmpeg -i instrumental.wav -i vocalist.wav -filter_complex \
          "[0:a]volume=0.8[a0];[1:a]volume=1.8[a1];[a0][a1]amix=inputs=2:duration=first,loudnorm" \
          final_song.wav

      - name: Step 6 Visuals & 4K Video Render
        run: |
          curl -L -o bg.jpg "https://images.unsplash.com/photo-1518621736915-f3b1c41bfd00?q=80&w=1080&h=1920&auto=format&fit=crop"
          ffmpeg -y -loop 1 -i bg.jpg -i final_song.wav -c:v libx264 -t 25 -pix_fmt yuv420p \
          -vf "scale=1080:1920,format=yuv420p" -c:a aac -b:a 256k youtube_ready.mp4

      - name: Step 7 Telegram Delivery
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -F chat_id=$TELEGRAM_CHAT_ID -F video=@"youtube_ready.mp4" -F caption="💎 INTERNAL HARMONY SUCCESS: 100% Automated Professional Melodic Short!" https://api.telegram.org/bot$TELEGRAM_TOKEN/sendVideo
