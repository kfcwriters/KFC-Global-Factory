name: AI Music Short Factory (Final Audio Success)

on:
  workflow_dispatch: 

jobs:
  production-line:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl

      - name: STEP 1 Download Romantic AI Photo
        run: |
          curl -L -o romantic_bg.jpg "https://images.unsplash.com/photo-1518621736915-f3b1c41bfd00?q=80&w=720&h=1280&auto=format&fit=crop"

      - name: STEP 2 Download GUARANTEED Audio
        # Using a specialized SoundHelix link that is famous for working with FFmpeg
        run: |
          curl -L -o haryanvi_song.mp3 "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"

      - name: STEP 3 The Emperor Merge (Final Codec Fix)
        run: |
          # We use -vcodec libx264 for the photo and -acodec aac for the sound
          # 'loudnorm' filter fixes the "frustrating" sound by balancing the audio
          ffmpeg -y -loop 1 -i romantic_bg.jpg -i haryanvi_song.mp3 \
          -t 15 -pix_fmt yuv420p \
          -vf "scale=720:1280,format=yuv420p" \
          -c:v libx264 -c:a aac -b:a 192k -ar 44100 \
          -af "loudnorm=I=-16:TP=-1.5:LRA=11,volume=2.0" \
          -shortest final_perfect_short.mp4

      - name: STEP 4 Delivery Agent
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -F chat_id=$TELEGRAM_CHAT_ID \
               -F video=@"final_perfect_short.mp4" \
               -F caption="🎼 SUCCESS: Crystal Clear Audio & Romantic Visuals!" \
               https://api.telegram.org/bot$TELEGRAM_TOKEN/sendVideo
