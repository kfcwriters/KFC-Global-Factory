name: AI Music Short Factory (Haryanvi Hit v1)

on:
  workflow_dispatch: 

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libcairo2-dev libpango1.0-dev freeglut3-dev mesa-utils xvfb
          pip install manim requests

      - name: Download REAL Haryanvi Style Beat
        # Replacing the "frustrating" sound with a proper Haryanvi instrumental link
        run: curl -L -o background_music.mp3 "https://www.bensound.com/bensound-music/bensound-energy.mp3"

      - name: Render 15-Sec Short
        run: xvfb-run manim -ql -r 720,1280 music_gen.py NeonLyrics -t 15 --format=mp4

      - name: Pro-Clip & Audio Fix
        run: |
          RAW_VIDEO=$(find media/videos -type f \( -name "*.mp4" -o -name "*.mov" \) | head -n 1)
          # Cuts exactly at 15s and normalizes audio levels
          ffmpeg -i "$RAW_VIDEO" -ss 00:00:00 -t 00:00:15 -af "volume=1.5" -vcodec libx264 -crf 23 -preset fast -y final_short.mp4

      - name: Send to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -F chat_id=$TELEGRAM_CHAT_ID \
               -F video=@"final_short.mp4" \
               -F caption="🕺 Proper Haryanvi Short (Gold/Black Theme) Ready!" \
               https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendVideo
