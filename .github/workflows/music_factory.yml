name: AI Music Shorts Factory

on:
  schedule:
    - cron: '0 2,14 * * *' # Runs at 7:30 AM and 7:30 PM IST
  workflow_dispatch: 

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libcairo2-dev libpango1.0-dev freeglut3-dev mesa-utils xvfb

      - name: Install Python Libraries
        run: |
          pip install manim google-api-python-client google-auth-oauthlib requests

      - name: Render Romantic Short (Manim)
        # -qm ensures good quality, -r ensures vertical resolution
        run: xvfb-run manim -qm -r 1080,1920 music_gen.py NeonLyrics

      - name: Execute Auto-Upload to New ID
        env:
          NEW_YT_CLIENT_ID: ${{ secrets.NEW_YT_CLIENT_ID }}
          NEW_YT_CLIENT_SECRET: ${{ secrets.NEW_YT_CLIENT_SECRET }}
          NEW_YT_REFRESH_TOKEN: ${{ secrets.NEW_YT_REFRESH_TOKEN }}
        run: python uploader.py
