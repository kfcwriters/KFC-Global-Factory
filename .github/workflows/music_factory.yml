name: AI Music Review Factory (720p 15-Sec)

on:
  workflow_dispatch: 

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libcairo2-dev libpango1.0-dev freeglut3-dev mesa-utils xvfb
          pip install manim requests

      - name: Download Audio
        # Grabs a beat to use as background
        run: curl -L -o background_music.mp3 "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"

      - name: Render 15-Second Short
        # -ql = Low Quality / Fast
        # -r 720,1280 = Vertical 720p
        # -t 15 = Forces the video to stop at 15 seconds
        run: xvfb-run manim -ql -r 720,1280 music_gen.py NeonLyrics -t 15

      - name: Send to Telegram Review
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          VIDEO_PATH=$(find media/videos -name "*.mp4" | head -n 1)
          if [ -f "$VIDEO_PATH" ]; then
            curl -F chat_id=$TELEGRAM_CHAT_ID \
                 -F video=@"$VIDEO_PATH" \
                 -F caption="✅ 15-Second Haryanvi Short Ready! Reviewing for lyrics..." \
                 https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendVideo
          else
            echo "Error: Video not found!"
            exit 1
          fi
