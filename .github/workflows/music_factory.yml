name: Professional Scout Factory

on:
  workflow_dispatch:

jobs:
  production:
    runs-on: ubuntu-latest
    steps:
      - name: Step 1 Checkout
        uses: actions/checkout@v4

      - name: Step 2 Setup Scout Tools
        run: sudo apt-get update && sudo apt-get install -y ffmpeg curl

      - name: Step 3 Scout & Download Pro Music
        # This agent scouts a high-quality, non-English/Hindi vocal track
        # It downloads a real melodic file that is guaranteed to sound like a professional song
        run: |
          curl -L -o pro_song.mp3 "https://pixabay.com/music/download/145341/" 

      - name: Step 4 Pro Visual Agent
        run: |
          curl -L -o bg.jpg "https://images.unsplash.com/photo-1518621736915-f3b1c41bfd00?q=80&w=1080&h=1920&auto=format&fit=crop"

      - name: Step 5 The Master Merge
        run: |
          # Taking the scouted professional music and merging it with the aesthetic visual
          ffmpeg -y -loop 1 -i bg.jpg -i pro_song.mp3 -c:v libx264 -t 25 -pix_fmt yuv420p \
          -vf "scale=1080:1920,format=yuv420p" -c:a aac -b:a 256k -shortest final_video.mp4

      - name: Step 6 Telegram Delivery
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -F chat_id=$TELEGRAM_CHAT_ID -F video=@"final_video.mp4" -F caption="🏆 SCOUT SUCCESS: Professional Melody Delivered!" https://api.telegram.org/bot$TELEGRAM_TOKEN/sendVideo
