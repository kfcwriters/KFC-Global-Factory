name: Final Orchestra Success Factory

on:
  workflow_dispatch:

jobs:
  production:
    runs-on: ubuntu-latest
    steps:
      - name: Step 1 Checkout
        uses: actions/checkout@v4

      - name: Step 2 Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl
          pip install gTTS

      - name: Step 3 Lyric & Singer Agent
        run: |
          # Writing long, unique lyrics to ensure the song lasts the full duration
          echo "Teri aankhon ka noor hai nirala,
          Dil ko mere tune hi sambhala.
          In the moonlight, your face is glowing,
          Like a river, our love is flowing.
          Har pal mein tera hi ehsaas hai,
          Tu mere dil ke sabse paas hai." > lyrics.txt
          gtts-cli -f lyrics.txt --lang hi --output voice.mp3

      - name: Step 4 The Music Composer (Guaranteed)
        run: |
          # Layer 1: Deep Bass Pulse
          ffmpeg -f lavfi -i "sine=f=80:d=25,tremolo=f=2:d=0.5" -t 25 bass.wav
          # Layer 2: Rhythmic High-Hat (Using high-freq sine instead of noise to prevent crashes)
          ffmpeg -f lavfi -i "sine=f=8000:d=25,tremolo=f=8:d=0.9" -t 25 percussion.wav
          # Layer 3: Melodic Lead
          ffmpeg -f lavfi -i "sine=f=440:d=25,vibrato=f=4:d=0.5" -t 25 melody.wav
          
          # Mix all instruments together with a professional echo
          ffmpeg -i bass.wav -i percussion.wav -i melody.wav -filter_complex "[0:a]volume=1.2[a0];[1:a]volume=0.3[a1];[2:a]volume=0.4[a2];[a0][a1][a2]amix=inputs=3:duration=longest,aecho=0.8:0.9:1000:0.3" beat.wav

      - name: Step 5 The Producer (Mastering)
        run: |
          # Giving the voice a professional singing 'Chorus' and 'Vibrato'
          ffmpeg -i voice.mp3 -af "vibrato=f=6:d=0.5,chorus=0.5:0.9:50:0.4:0.25:2,aecho=0.8:0.88:60:0.4,volume=3.5" processed_voice.wav
          
          # Merge Voice + Music (Mastering for 25 seconds)
          ffmpeg -i beat.wav -i processed_voice.wav -filter_complex "[0:a]volume=0.8[a0];[1:a]volume=2.8[a1];[a0][a1]amix=inputs=2:duration=longest,loudnorm" final_song.wav

      - name: Step 6 Create Vertical Video
        run: |
          curl -L -o bg.jpg "https://images.unsplash.com/photo-1518621736915-f3b1c41bfd00?q=80&w=1080&h=1920&auto=format&fit=crop"
          ffmpeg -y -loop 1 -i bg.jpg -i final_song.wav -c:v libx264 -t 25 -pix_fmt yuv420p -vf "scale=1080:1920,format=yuv420p" -c:a aac -b:a 256k youtube_ready.mp4

      - name: Step 7 Telegram Delivery
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -F chat_id=$TELEGRAM_CHAT_ID -F video=@"youtube_ready.mp4" -F caption="🏆 MASTER COMPOSITION: Full Lyrics + 3-Layer Music!" https://api.telegram.org/bot$TELEGRAM_TOKEN/sendVideo
