name: Bark AI Singing Factory (CPU Fix)

on:
  workflow_dispatch:

jobs:
  production:
    runs-on: ubuntu-latest
    steps:
      - name: Step 1 Checkout
        uses: actions/checkout@v4

      - name: Step 2 Install CPU-Friendly Engine
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl
          # We install the CPU-only version of Torch to avoid the 'libcudart' error
          pip install torch==2.3.1+cpu torchaudio==2.3.1+cpu --index-url https://download.pytorch.org/whl/cpu
          pip install numpy==1.26.4
          pip install git+https://github.com/suno-ai/bark.git

      - name: Step 3 AI Vocalist (The Singing Agent)
        run: |
          python3 - <<EOF
          import os
          import torch
          # Force Torch to look ONLY at the CPU
          os.environ["CUDA_VISIBLE_DEVICES"] = ""
          os.environ["SUNO_OFFLOAD_CPU"] = "True"
          os.environ["SUNO_USE_SMALL_MODELS"] = "True"
          
          from bark import SAMPLE_RATE, generate_audio, preload_models
          from scipy.io.wavfile import write
          
          # Bypass security checks for loading models
          import torch.serialization
          torch.serialization.default_restore_location = lambda storage, loc: storage

          print("Loading CPU-Optimized Singing Brain...")
          preload_models()
          
          print("Generating Melodic Singing...")
          # [music] and ♪ tags trigger the actual singing melody
          text_prompt = "♪ Teri aankhon ka noor, dil gaya mera choor. Moonlight mein hum, udte hain kitni door. ♪"
          
          audio_array = generate_audio(text_prompt)
          write("singing_vocals.wav", SAMPLE_RATE, audio_array)
          print("Singing Complete!")
          EOF

      - name: Step 4 Music Production (Beat)
        run: |
          ffmpeg -f lavfi -i "sine=f=110:d=25,tremolo=f=3:d=0.5" \
                 -f lavfi -i "sine=f=220:d=25,vibrato=f=4:d=0.4" \
                 -filter_complex "amix=inputs=2:duration=longest,aecho=0.8:0.9:1000:0.3,volume=3.5" \
                 beat.wav

      - name: Step 5 Master Mix & Render
        run: |
          ffmpeg -i beat.wav -i singing_vocals.wav -filter_complex "[0:a]volume=0.7[a0];[1:a]volume=2.5[a1];[a0][a1]amix=inputs=2:duration=longest,loudnorm" final_song.wav
          curl -L -o bg.jpg "https://images.unsplash.com/photo-1518621736915-f3b1c41bfd00?q=80&w=1080&h=1920&auto=format&fit=crop"
          ffmpeg -y -loop 1 -i bg.jpg -i final_song.wav -c:v libx264 -t 25 -pix_fmt yuv420p -vf "scale=1080:1920,format=yuv420p" -c:a aac -b:a 256k youtube_ready.mp4

      - name: Step 6 Telegram Delivery
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -F chat_id=$TELEGRAM_CHAT_ID -F video=@"youtube_ready.mp4" -F caption="🎵 SUCCESS: Generative AI Singing (CPU Optimized)!" https://api.telegram.org/bot$TELEGRAM_TOKEN/sendVideo
