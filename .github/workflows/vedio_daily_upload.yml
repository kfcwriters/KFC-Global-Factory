name: "Daily AI Music Upload (music project)"

on:
  schedule:
    - cron: "0 10 * * *"   # 10:00 AM UTC daily
  workflow_dispatch:
    inputs:
      test_mode:
        description: "Test mode (generate only, no upload)"
        required: false
        default: "false"
      niche_index:
        description: "Force a specific niche index (0-5), leave blank for auto"
        required: false
        default: ""

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies (music project only)
        run: pip install -r ai-music-youtube/ai_music_requirements.txt

      - name: Run music pipeline
        working-directory: ai-music-youtube
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS_MUSIC }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.test_mode }}" = "true" ]; then
            ARGS="$ARGS --test"
          fi
          if [ -n "${{ github.event.inputs.niche_index }}" ]; then
            ARGS="$ARGS --niche ${{ github.event.inputs.niche_index }}"
          fi
          python ai_music_pipeline.py $ARGS

      - name: Upload output as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: music-video-output
          path: ai-music-youtube/ai_music_output/
          retention-days: 7
