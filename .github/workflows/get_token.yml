name: Get YouTube Refresh Token
on: workflow_dispatch # Allows you to start it with a button

jobs:
  token-grabber:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Libs
        run: pip install google-auth-oauthlib

      - name: Run Grabber
        run: |
          python - <<EOF
          import google_auth_oauthlib.flow
          
          # Using your credentials from the screenshot
          client_id = "854773871809-527kbh5ral2l2u4rm2takmk6hkfphlc2.apps.googleusercontent.com"
          client_secret = "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"
          
          flow = google_auth_oauthlib.flow.InstalledAppFlow.from_client_config(
              {"installed": {"client_id": client_id, "client_secret": client_secret, "auth_uri": "https://accounts.google.com/o/oauth2/auth", "token_uri": "https://oauth2.googleapis.com/token"}},
              scopes=["https://www.googleapis.com/auth/youtube.upload"]
          )
          
          flow.redirect_uri = "urn:ietf:wg:oauth:2.0:oob"
          auth_url, _ = flow.authorization_url(prompt='consent')
          
          print(f"\n\nSTEP 1: OPEN THIS LINK IN YOUR BROWSER:\n{auth_url}\n")
          print("STEP 2: LOGIN WITH YOUR NEW ID AND COPY THE CODE.")
          print("STEP 3: WE WILL FINISH IN THE NEXT TURN.\n\n")
          EOF
