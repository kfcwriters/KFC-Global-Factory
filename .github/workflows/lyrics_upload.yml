name: 🎵 Daily Hindi-English Lyric Video

on:
  schedule:
    - cron: "30 17 * * *"    # 11:00 PM IST every day
  workflow_dispatch:
    inputs:
      test_mode:
        description: "true = skip upload"
        required: false
        default: "false"

jobs:
  lyrics-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:

      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 🔧 System dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg fonts-dejavu-core fonts-liberation espeak-ng

      - name: 📥 Python dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      - name: 🎤 Install Bark AI singing
        run: |
          pip install torch torchaudio \
            --index-url https://download.pytorch.org/whl/cpu --quiet
          pip install suno-bark --quiet

      - name: 🗂️ Cache Bark models
        uses: actions/cache@v4
        with:
          path: ~/.cache/suno
          key: bark-small-models-v1

      - name: 🎵 Run Lyric Video Pipeline
        env:
          HF_TOKEN:            ${{ secrets.HF_TOKEN }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
          SUNO_USE_SMALL_MODELS: "True"
          SUNO_OFFLOAD_CPU: "True"
        run: |
          if [ "${{ github.event.inputs.test_mode }}" = "true" ]; then
            echo "Test mode — skipping upload"
          else
            python lyrics_pipeline.py
          fi

      - name: 📋 Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lyrics-failure-logs
          path: "*.log"
          retention-days: 7
