name: Bansal Lab Patient Hunter

on:
  workflow_dispatch:
  schedule:
    - cron: '30 4 * * *' # 10:00 AM IST daily

jobs:
  outreach:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Hunt Leads
        run: python3 patient_hunter.py
      - name: Execute Outlook Strike
        env:
          OUTLOOK_APP_PASSWORD: ${{ secrets.OUTLOOK_APP_PASSWORD }}
        run: python3 outlook_sender.py
