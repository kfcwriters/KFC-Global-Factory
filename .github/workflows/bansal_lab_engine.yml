name: Bansal Lab Patient Acquisition

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * *' # Runs every day at 10:30 AM IST

jobs:
  run-consultancy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Ad and Hunt Leads
        run: |
          python3 consultancy_agent.py
          python3 patient_hunter.py

      - name: Send Advertisement to Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          AD_TEXT=$(cat daily_ad.txt)
          python3 -c "import requests, os; requests.post(f'https://api.telegram.org/bot{os.getenv(\"TELEGRAM_TOKEN\")}/sendMessage', data={'chat_id': os.getenv(\"TELEGRAM_CHAT_ID\"), 'text': os.getenv(\"AD_TEXT\")})"

      - name: Dispatch Outreach Emails
        env:
          GMAIL_USER: "kfcwriters@gmail.com"
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        run: |
          # This connects to your existing email_sender.py
          python3 email_sender.py --source patient_leads.txt
